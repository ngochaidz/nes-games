<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Center - NES Classics</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --sidebar-bg: #1a1a24;
            --primary-color: #00d2ff;
            --accent-color: #ff0055;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar bên trái */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
        }

        .sidebar-header h1 {
            margin: 0; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase;
        }

        .game-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .game-item {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #252535;
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .game-item:hover {
            background: #303045;
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .game-item.active {
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        /* Khu vực chơi game bên phải */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle, #222 0%, #000 100%);
        }

        .top-bar {
            padding: 15px;
            background: rgba(0,0,0,0.5);
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #game-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: bold;
            text-transform: uppercase;
        }

        .emulator-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #nes-iframe {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            border: 10px solid #333;
            border-radius: 15px;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* Responsive cho mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 2px solid #333; }
            .main-content { height: 70%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>NES EMULATOR</h1>
        </div>
        <div class="game-list" id="game-list">
            </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="game-title">CHỌN GAME ĐỂ CHƠI</div>
        </div>
        <div class="emulator-wrapper">
            <iframe id="nes-iframe" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    // 1. CẤU HÌNH TÊN USER VÀ REPO CỦA BẠN
    const GH_USER = "ngochaidz";
    const GH_REPO = "nes-games";

    // 2. DANH SÁCH GAME 
    // Tên file phải khớp chính xác với file trên GitHub (kể cả hoa/thường)
    const games = [
        { name: "Contra (USA)", file: "Contra (USA).nes" },
        { name: "Contra Force", file: "contra.nes" },
        { name: "Tank 1990", file: "tank.nes" },
        { name: "Bomberman", file: "bomberman.nes" }
    ];

    const gameListDiv = document.getElementById('game-list');
    const iframe = document.getElementById('nes-iframe');
    const titleDisp = document.getElementById('game-title');

    // 3. Tự động tạo danh sách nút bấm
    games.forEach((game) => {
        const btn = document.createElement('button');
        btn.className = 'game-item';
        btn.innerHTML = `🎮 ${game.name}`;
        btn.onclick = () => loadGame(game.file, game.name, btn);
        gameListDiv.appendChild(btn);
    });

    function loadGame(fileName, gameName, element) {
        // Cập nhật giao diện nút
        document.querySelectorAll('.game-item').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        titleDisp.innerText = "Đang chơi: " + gameName;

        // TẠO LINK RAW CHUẨN ĐỂ GIẢ LẬP ĐỌC ĐƯỢC
        // Link có dạng: https://ngochaidz.github.io/nes-games/Contra%20(USA).nes
        const encodedFileName = encodeURIComponent(fileName);
        const romUrl = `https://${GH_USER}.github.io/${GH_REPO}/${encodedFileName}`;

        console.log("Đang tải game từ:", romUrl); // Dòng này để kiểm tra lỗi nếu có

        // Nhúng EmulatorJS
        const emulatorHtml = `
            <!DOCTYPE html>
            <html>
                <head>
                    <meta charset="UTF-8">
                    <style>body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }</style>
                </head>
                <body>
                    <div id="game" style="width:100%; height:100vh;"></div>
                    <script>
                        EJS_player = "#game";
                        EJS_core = "nes"; // Lõi chạy game NES
                        EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                        EJS_gameUrl = "${romUrl}";
                    <\/script>
                    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
                </body>
            </html>
        `;
        
        // Xóa iframe cũ và tạo lại để tránh lỗi cache của trình duyệt
        iframe.srcdoc = emulatorHtml;
    }

    // Màn hình chờ ban đầu
    iframe.srcdoc = `<body style="background:#000; color:#00d2ff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; text-align:center;"><div><h1 style="letter-spacing:5px;">READY TO PLAY</h1><p>Chọn game bên trái để bắt đầu</p></div></body>`;
</script>

</body>
</html>
