<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Handheld Console</title>
    <style>
        :root {
            --body-bg: #0a0a0c;
            --console-bg: #1e1e26;
            --screen-border: #333;
            --primary: #00d2ff;
            --button-bg: #2d2d3a;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--body-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Layout Tổng thể */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar cho PC */
        .sidebar {
            width: 280px;
            background: var(--console-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(to bottom, #3a3a4a, #1e1e26);
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .game-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .game-item {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--button-bg);
            border: none;
            border-radius: 6px;
            color: #ccc;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-item.active {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        /* Khu vực Máy chơi game */
        .console-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #222 0%, #000 100%);
            padding: 10px;
        }

        .screen-container {
            width: 100%;
            max-width: 650px;
            aspect-ratio: 4/3;
            background: #000;
            border: 12px solid var(--console-bg);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .game-info {
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ĐIỀU CHỈNH RIÊNG CHO ĐIỆN THOẠI (Mobile Portrait) */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 120px; /* Thu gọn danh sách game lên trên hoặc dưới */
                order: 2;
                border-right: none;
                border-top: 1px solid #444;
            }

            .game-list {
                display: flex;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 10px;
                gap: 10px;
            }

            .game-item {
                flex: 0 0 140px;
                margin-bottom: 0;
                white-space: nowrap;
                font-size: 12px;
                padding: 8px;
            }

            .console-area {
                height: calc(100vh - 120px);
                justify-content: flex-start; /* Đẩy màn hình game lên trên */
                padding-top: 20px;
            }

            .screen-container {
                border-width: 6px;
                max-width: 95vw;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 1rem; color: var(--primary);">RETRO CONSOLE</h2>
        </div>
        <div class="game-list" id="game-list">
            </div>
    </div>

    <div class="console-area">
        <div class="game-info" id="current-title">CHỌN GAME</div>
        <div class="screen-container">
            <iframe id="emu-frame" allow="autoplay; gamepad"></iframe>
        </div>
        <div style="margin-top: 15px; font-size: 10px; color: #555;">EMULATOR V1.2 - BY NGOCHAIDZ</div>
    </div>
</div>

<script>
    const GH_USER = "ngochaidz";
    const GH_REPO = "nes-games";

    const games = [
        { name: "Contra (USA)", file: "Contra (USA).nes" },
        { name: "Contra Force", file: "contra.nes" },
        { name: "Tank 1990", file: "tank.nes" },
        { name: "Bomberman", file: "bomberman.nes" }
    ];

    const gameList = document.getElementById('game-list');
    const iframe = document.getElementById('emu-frame');
    const title = document.getElementById('current-title');

    games.forEach(game => {
        const btn = document.createElement('button');
        btn.className = 'game-item';
        btn.innerHTML = `🎮 ${game.name}`;
        btn.onclick = () => {
            document.querySelectorAll('.game-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadGame(game);
        };
        gameList.appendChild(btn);
    });

    function loadGame(game) {
        title.innerText = "Đang chơi: " + game.name;
        const romUrl = `https://${GH_USER}.github.io/${GH_REPO}/${encodeURIComponent(game.file)}`;

        // Cấu hình EmulatorJS tối ưu cho Mobile
        const emuHTML = `
            <!DOCTYPE html>
            <html>
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                    <style>
                        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
                        #game { width: 100%; height: 100%; }
                    </style>
                </head>
                <body>
                    <div id="game"></div>
                    <script>
                        EJS_player = "#game";
                        EJS_core = "nes";
                        EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                        EJS_gameUrl = "${romUrl}";
                        
                        // Cấu hình nút bấm ảo
                        EJS_Buttons = {
                            "up": "Lên", "down": "Xuống", "left": "Trái", "right": "Phải",
                            "a": "A", "b": "B", "start": "Start", "select": "Select"
                        };
                        
                        // Tối ưu để các nút không che màn hình quá nhiều
                        EJS_mouse_enabled = false;
                        EJS_virtual_gamepad = true; 
                    <\/script>
                    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
                </body>
            </html>
        `;
        iframe.srcdoc = emuHTML;
    }

    iframe.srcdoc = `<body style="background:#000; color:#444; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;"><h3>READY</h3></body>`;
</script>
</body>
</html>
